<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spreadsheet Data</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @font-face {
            font-family: "Schreibmaschine";
            src: url("schreibmaschine.woff") format("woff");
            font-weight: normal;
            font-style: normal;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Schreibmaschine", "Times New Roman", Times, serif;
            font-size: 30px;
            text-align: center;
        }
        #output { text-align: center; }
        #output p { margin: 0.5em 0; }
        #output a { color: blue; text-decoration: 2px solid blue; }
    </style>
</head>
<body>
    <div id="output"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg7_DJGHOxgCsmo5c6eYtYapN7n0ul4e0QA6g8k10miWS6VTEWZLmbP063i9FQYSbarFwm_9IMvN1m/pub?output=csv";

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    renderLines(results.data, results.meta.fields || []);
                }
            });
        });

        function renderLines(data, headers) {
            const keys = headers.length ? headers : (data[0] ? Object.keys(data[0]) : []);
            const getKey = (name) =>
                keys.find(k => k.trim().toLowerCase() === name.toLowerCase()) ||
                keys.find(k => k.includes(name)) ||
                name;

            const beskrivningKey = getKey("Beskrivning");
            const namnKey = getKey("namn");
            const urlKey = getKey("URL");

            const container = document.getElementById("output");

            const itemsToAnimate = [];

            // Use A11 as <h1> and B11 as bottom <p>
            const titleRowIndex = 9; // zero-based index -> row 11 in the sheet
            const titleRow = data[titleRowIndex];
            if (titleRow && typeof titleRow === "object") {
                const colAKey = keys[0];
                const colBKey = keys[1];
                const titleText = (titleRow[colAKey] != null ? String(titleRow[colAKey]) : "").trim();
                const bottomText = (titleRow[colBKey] != null ? String(titleRow[colBKey]) : "").trim();

                if (titleText) {
                    const h1 = document.createElement("h1");
                    h1.textContent = titleText;
                    document.body.insertBefore(h1, container);
                    itemsToAnimate.push({ el: h1, text: titleText });
                }

                if (bottomText) {
                    const bottomP = document.createElement("p");
                    bottomP.textContent = bottomText;
                    document.body.appendChild(bottomP);
                    itemsToAnimate.push({ el: bottomP, text: bottomText });
                }
            }

            data.forEach((row, index) => {
                if (!row || typeof row !== "object") return;
                // Skip the special title row (A11/B11)
                if (index === titleRowIndex) return;

                const beskrivning = (row[beskrivningKey] != null ? String(row[beskrivningKey]) : "").trim();
                const namn = (row[namnKey] != null ? String(row[namnKey]) : "").trim();
                let url = (row[urlKey] != null ? String(row[urlKey]) : "").trim();
                if (url && !/^https?:\/\//i.test(url)) url = "https://" + url;

                const lineText = beskrivning ? beskrivning + " by " + (namn || "—") : namn || "—";

                const p = document.createElement("p");
                if (url) {
                    const a = document.createElement("a");
                    a.href = url;
                    a.textContent = lineText;
                    a.target = "_blank";
                    a.rel = "noopener";
                    p.appendChild(a);
                } else {
                    p.textContent = lineText;
                }

                container.appendChild(p);
                itemsToAnimate.push({ el: url ? p.querySelector("a") : p, text: lineText });
            });

            animateLetters(itemsToAnimate);
        }

        function animateLetters(items) {
            if (!items.length) return;

            const state = new Map();

            items.forEach(item => {
                const chars = Array.from(item.text);
                const display = chars.map(() => "");
                state.set(item.el, { chars, display });
                item.el.textContent = "";
            });

            let delay = 0;
            const stepDelay = 5;
            const alphabet = "abcdefghijklmnopqrstuvwxyz";

            // Reveal all a's, then b's, etc, across all elements
            for (const letter of alphabet) {
                items.forEach(item => {
                    const data = state.get(item.el);
                    data.chars.forEach((ch, idx) => {
                        if (data.display[idx] === "" && ch.toLowerCase() === letter) {
                            delay += stepDelay;
                            setTimeout(() => {
                                data.display[idx] = ch;
                                item.el.textContent = data.display.join("").replace(/ /g, "\u00A0");
                            }, delay);
                        }
                    });
                });
            }

            // Finally reveal remaining characters (spaces, punctuation, digits, etc.)
            items.forEach(item => {
                const data = state.get(item.el);
                data.chars.forEach((ch, idx) => {
                    if (data.display[idx] === "") {
                        delay += stepDelay;
                        setTimeout(() => {
                            data.display[idx] = ch;
                            item.el.textContent = data.display.join("").replace(/ /g, "\u00A0");
                        }, delay);
                    }
                });
            });
        }
    </script>
</body>
</html>
